<div class="page-shell dashboard-shell">

  <!-- Hero section: page title, 1-on-1 user filter, and profile switch -->
  <section class="hero-panel">
    <div class="hero-copy">
      <p class="eyebrow">Dashboard</p>
      <h1 *ngIf="currentUser">{{ currentUser.username }}'s balance sheet.</h1>
      <p>{{ viewDescription }}</p>
    </div>

    <div class="hero-controls">
      <label class="field-card">
        <span>Show activity with</span>
        <select
          [(ngModel)]="selectedOtherUserId"
          name="selectedOtherUserId"
          (ngModelChange)="onFilterChange($event)"
        >
          <option value="">Everyone</option>
          <option *ngFor="let user of otherUsers" [value]="user.userId">
            {{ user.username }}
          </option>
        </select>
      </label>

      <button type="button" class="secondary-button" (click)="switchUser()">
        Switch profile
      </button>
    </div>
  </section>

  <p *ngIf="errorMessage" class="status-banner error">{{ errorMessage }}</p>

  <!-- Loading state shown while the initial forkJoin request is in flight -->
  <section *ngIf="isLoading" class="loading-card">
    <div class="spinner"></div>
    <div>
      <p class="eyebrow">One moment</p>
      <h2>Loading your data…</h2>
    </div>
  </section>

  <ng-container *ngIf="!isLoading && !errorMessage">

    <!-- Four stat cards; clicking a card toggles a filter on the activity log -->
    <app-scale
      [stats]="scaleStats"
      [currentUserName]="currentUser?.username ?? ''"
      [otherUserName]="selectedOtherUserName"
      [activeFilters]="activeScaleFilters"
      (filterSelected)="onScaleFilterSelected($event)"
    ></app-scale>

    <!-- Combined borrow/favor timeline with local filters and edit mode -->
    <app-activity-log
      [entries]="activityEntries"
      [scaleFilters]="activeScaleFilters"
      [selectedOtherUserName]="selectedOtherUserName"
      (clearScaleFilter)="clearScaleFilter()"
      (entryUpdated)="refreshDashboard()"
    ></app-activity-log>

  </ng-container>

  <!-- Floating action button — opens the entry composer panel -->
  <button
    type="button"
    class="floating-create-button"
    aria-label="Create a new entry"
    (click)="openComposer()"
  >
    +
  </button>

  <!-- Slide-in modal for creating new borrows or favors -->
  <app-create-entry
    [isOpen]="isComposerOpen"
    [users]="otherUsers"
    [currentUserId]="currentUserId"
    [selectedOtherUserId]="selectedOtherUserId || null"
    (closed)="closeComposer()"
    (saved)="handleEntrySaved()"
  ></app-create-entry>

</div>
