<div *ngIf="isOpen" class="composer-overlay" (click)="closePanel()">
  <section class="composer-panel" (click)="stopPanelClick($event)">
    <header class="composer-header">
      <div>
        <p class="eyebrow">Create Entry</p>
        <h2>{{ modalTitle }}</h2>
      </div>

      <button
        type="button"
        class="icon-close-button"
        aria-label="Close create entry panel"
        (click)="closePanel()"
      >
        x
      </button>
    </header>

    <div class="toggle-row">
      <button
        type="button"
        class="toggle-chip favor"
        [class.active]="entryType === 'favor'"
        (click)="chooseType('favor')"
      >
        Favor
      </button>
      <button
        type="button"
        class="toggle-chip borrow"
        [class.active]="entryType === 'borrow'"
        (click)="chooseType('borrow')"
      >
        Borrow
      </button>
    </div>

    <div class="toggle-row direction">
      <button
        type="button"
        class="toggle-chip"
        [class.active]="direction === 'outgoing'"
        (click)="chooseDirection('outgoing')"
      >
        {{ firstDirectionLabel }}
      </button>
      <button
        type="button"
        class="toggle-chip"
        [class.active]="direction === 'incoming'"
        (click)="chooseDirection('incoming')"
      >
        {{ secondDirectionLabel }}
      </button>
    </div>

    <label class="field-stack">
      <span>{{ titleLabel }}</span>
      <input
        type="text"
        [(ngModel)]="title"
        name="title"
        [placeholder]="titlePlaceholder"
      >
    </label>

    <label class="field-stack">
      <span>People</span>
      <div class="user-select-grid">
        <button
          *ngFor="let user of users"
          type="button"
          class="user-chip"
          [class.is-selected]="isUserSelected(user.userId)"
          (click)="toggleUserSelection(user.userId)"
        >
          <span class="check-indicator">{{ isUserSelected(user.userId) ? 'OK' : '+' }}</span>
          <span>{{ user.username }}</span>
        </button>
      </div>
    </label>

    <p class="selection-summary">{{ selectedUsersSummary }}</p>

    <div class="field-grid">
      <label class="field-stack">
        <span>Recorded on</span>
        <input type="date" [(ngModel)]="createdOn" name="createdOn">
      </label>

      <label *ngIf="entryType === 'borrow'" class="field-stack">
        <span>Due date</span>
        <input type="date" [(ngModel)]="dueDate" name="dueDate">
      </label>
    </div>

    <p class="composer-summary">{{ summaryText }}</p>
    <p *ngIf="errorMessage" class="status-banner error">{{ errorMessage }}</p>

    <footer class="composer-footer">
      <button type="button" class="ghost-button" (click)="closePanel()">Cancel</button>
      <button type="button" class="primary-button" [disabled]="!canSave" (click)="saveEntry()">
        {{ isSaving ? 'Saving...' : 'Save' }}
      </button>
    </footer>
  </section>
</div>
