<section class="scale-shell">
  <div class="scale-header">
    <div>
      <p class="eyebrow">Your Balance</p>
      <h2>{{ heading }}</h2>
      <p>{{ subline }}</p>
    </div>
  </div>

  <div class="scale-grid">
    <button
      *ngFor="let card of cards"
      type="button"
      class="stat-card"
      [ngClass]="[
        card.tone,
        isActive(card.filterKey) ? 'is-active' : '',
        isMuted(card.filterKey) ? 'is-muted' : ''
      ]"
      (click)="selectFilter(card.filterKey)"
    >
      <span class="stat-label">{{ card.label }}</span>
      <strong class="stat-value">{{ card.value }}</strong>
      <p>{{ card.detail }}</p>
    </button>
  </div>
</section>
