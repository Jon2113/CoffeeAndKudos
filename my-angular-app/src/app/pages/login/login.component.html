<div class="page-shell login-shell">
  <section class="login-panel">
    <div class="intro-copy">
      <p class="eyebrow">Coffee &amp; Kudos</p>
      <h1>Choose your user.</h1>
      <p>Start by selecting who you are. We save your ID and load your dashboard.</p>
    </div>

    <section *ngIf="isLoading" class="loading-card">
      <div class="spinner"></div>
      <div>
        <p class="eyebrow">Login</p>
        <h2>Loading user list.</h2>
      </div>
    </section>

    <p *ngIf="errorMessage" class="status-banner error">{{ errorMessage }}</p>

    <div *ngIf="!isLoading && !errorMessage && users.length > 0" class="user-grid">
      <button
        *ngFor="let user of users; trackBy: trackByUserId"
        type="button"
        class="user-card"
        (click)="selectUser(user.userId)"
      >
        <span class="user-avatar">{{ user.username.charAt(0) | uppercase }}</span>

        <div class="user-copy">
          <h2>{{ user.username }}</h2>
          <p>{{ user.email || 'No email provided' }}</p>
        </div>

        <div class="user-metrics">
          <span>{{ user.countLent }} lent</span>
          <span>{{ user.favorsGiven }} favors given</span>
        </div>
      </button>
    </div>

    <section *ngIf="!isLoading && !errorMessage && users.length === 0" class="empty-panel">
      <p class="eyebrow">No users yet</p>
      <h2>No users are currently available in the backend.</h2>
      <p>Create users via API or database and they will appear here.</p>
    </section>
  </section>
</div>
